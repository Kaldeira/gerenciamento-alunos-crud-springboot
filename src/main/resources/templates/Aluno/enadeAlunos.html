<!DOCTYPE html>
<html lang="pt-br" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link rel="stylesheet" href="/webjars/bootstrap/css/bootstrap.min.css">
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.8.2/font/bootstrap-icons.css">

  <title>Gerenciamento de Alunos</title>
</head>

<body>

<div th:replace="fragmentos/fragmentos :: cabecalho"></div>

<div class="container mt-4">

  <h3 class="mb-3">Últimos Alunos Adicionados</h3>
  <hr>

  <table class="table table-bordered table-hover text-center">

    <thead class="table-dark">
    <tr>
      <th>Nome</th>
      <th>Matrícula</th>
      <th>ENADE</th>
    </tr>
    </thead>

    <tbody>
    <tr th:each="aluno : ${alunosAtivos}">
      <td th:text="${aluno.nome}"></td>
      <td th:text="${aluno.matricula}"></td>
      <td th:text="${aluno.enade}"></td>

<!--      <td>-->
<!--        <a class="btn btn-sm btn-primary" th:href="@{editar/{id}(id=${aluno.id})}">-->
<!--          <i class="bi bi-pencil-square"></i>-->
<!--        </a>-->

<!--        <a class="btn btn-sm btn-danger" th:href="@{remover/{id}(id=${aluno.id})}">-->
<!--          <i class="bi bi-x-square"></i>-->
<!--        </a>-->
<!--      </td>-->
    </tr>
    </tbody>

  </table>

  <div th:with="
    soma=${#aggregates.sum(alunosAtivos.![enade])},
    total=${#lists.size(alunosAtivos)},
    media=${total > 0 ? soma / total : 0}

">

    <div class="alert alert-info text-center">
      <strong>Média do ENADE:</strong>
      <span th:text="${#numbers.formatDecimal(media,1,2)}"></span>
    </div>

  </div>

</div>

<script src="/webjars/jquery/3.6.0/jquery.min.js"></script>
<script src="/webjars/bootstrap/js/bootstrap.min.js"></script>

</body>
</html>
